name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── 1. Create / update the release PR ──────────────────────────────────────
  release-please:
    name: Release Please
    runs-on: ubuntu-latest

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}
      version:         ${{ steps.release.outputs.version }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Android APK (runs only when a real release is published) ─────────────
  build-android:
    name: Build Android APK
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate localizations
        run: flutter gen-l10n

      # Write key.properties + decode keystore only when secrets are present
      - name: Set up release signing
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../keystore.jks
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          mv build/app/outputs/flutter-apk/app-release.apk \
             kasway-${VERSION}-android.apk

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            kasway-${VERSION}-android.apk \
            --clobber

  # ── 3. macOS DMG (runs only when a real release is published) ──────────────
  build-macos:
    name: Build macOS DMG
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Disable code signing for CI
        run: |
          sed -i '' \
            -e 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = "";/g' \
            -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' \
            macos/Runner.xcodeproj/project.pbxproj

      - name: Build macOS release
        run: flutter build macos --release
        env:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"

      - name: Create DMG
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          APP_PATH="build/macos/Build/Products/Release/kasway.app"
          DMG_NAME="kasway-${VERSION}-macos.dmg"

          # Stage: app + Applications symlink for drag-install UX
          mkdir -p /tmp/dmg_staging
          cp -r "$APP_PATH" /tmp/dmg_staging/
          ln -s /Applications /tmp/dmg_staging/Applications

          hdiutil create \
            -volname "Kasway $VERSION" \
            -srcfolder /tmp/dmg_staging \
            -ov \
            -format UDZO \
            "$DMG_NAME"

      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            kasway-${VERSION}-macos.dmg \
            --clobber
